<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ФАЙЛЫ ОТ ФЕЙКОВОГО КОМПОТА</title>
<style>
/* твои стили прежние */
</style>
</head>
<body>
<div class="site-wrapper">
  <div class="main-header">ФАЙЛЫ ОТ ФЕЙКОВОГО КОМПОТА</div>
  <div id="app"></div>
</div>

<script>
let role = localStorage.getItem("role");
let nick = localStorage.getItem("nick");

function saveAll(){ 
  localStorage.setItem("role", role);
  localStorage.setItem("nick", nick);
}

function render(){
  const app = document.getElementById("app");
  const modParam = new URLSearchParams(window.location.search).get("mod");

  if(modParam){
    fetch("http://localhost:3000/api/mods")
      .then(r => r.json())
      .then(files => {
        const f = files.find(x => x.title === decodeURIComponent(modParam));
        if(!f){ app.innerHTML="<div>МОД НЕ НАЙДЕН</div>"; return; }

        let html = `<div class="file-page">
          <h2>${f.title}</h2>
          <a href="${f.url}" download><button>СКАЧАТЬ</button></a>
          <br><br>
          <a href="${window.location.pathname}">← НАЗАД</a>
        </div>`;
        app.innerHTML = html;
      });
    return;
  }

  if(!role){ showLogin(); return; }

  let html = `<button onclick="logout()">ВЫЙТИ</button>`;

  if(role==="admin"){
    html += `
      <div>
        <input id="title" placeholder="Название">
        <input type="file" id="file">
        <button onclick="upload()">ЗАГРУЗИТЬ</button>
      </div>`;
  }

  fetch("http://localhost:3000/api/mods")
    .then(r => r.json())
    .then(files => {
      html += `<div>`;
      files.forEach(f => {
        html += `<div>${f.title} <a href="?mod=${encodeURIComponent(f.title)}">ОТКРЫТЬ</a></div>`;
      });
      html += `</div>`;
      app.innerHTML = html;
    });
}

function showLogin(){
  document.getElementById("app").innerHTML = `
    <div>
      <input id="nickInput" placeholder="Ник">
      <button onclick="login()">ВОЙТИ</button>
    </div>`;
}

function login(){
  const n = document.getElementById("nickInput").value.trim();
  if(!n) return;

  if(n==="rtQu27"){
    const pass = prompt("Пароль:");
    role = (pass==="13") ? "admin" : "user";
  } else {
    role="user";
  }
  nick=n;
  saveAll();
  render();
}

function logout(){ role=null; nick=null; saveAll(); render(); }

function upload(){
  const input = document.getElementById("file");
  const f = input.files[0];
  if(!f) return;

  const form = new FormData();
  form.append("mod", f);

  fetch("http://localhost:3000/api/upload", { method:"POST", body:form })
    .then(r=>r.json())
    .then(r=>{ alert(r.message); render(); });
}

render();
</script>
</body>
</html>
