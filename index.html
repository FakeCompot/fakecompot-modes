<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ФАЙЛЫ ОТ ФЕЙКОВОГО КОМПОТА</title>

<style>
@font-face { font-family:'Minecraft'; src:url('https://cdn.jsdelivr.net/npm/minecraft-font@1.0.0/minecraft_font.otf') format('opentype'); }
*{ box-sizing:border-box; margin:0; padding:0; font-family:'Minecraft', monospace!important;}
body{ background:linear-gradient(145deg,#0b2b3b,#06314a); color:#b3e4ff; padding:24px; }
.site-wrapper{ max-width:1300px; margin:auto; background:#0a2e3fd9; border:6px solid #3b8fbd; padding:20px; }
.main-header{ text-align:center; font-size:2rem; background:#0a3f55; border:3px solid #6ec8ff; padding:16px; margin-bottom:20px; }
button{ background:#1e6f8f; border:3px solid #9ad7ff; color:#fff; padding:8px 20px; cursor:pointer; }
input,textarea{ background:#05222e; border:2px solid #4aa5d0; padding:10px; color:#c2ecff; width:90%; margin:10px 0; }
a.button-link{ display:inline-block; background:#1e6f8f; border:3px solid #9ad7ff; color:#fff; padding:6px 15px; text-decoration:none; margin-top:5px;}
.files-panel{ background:#0e384bb3; border:3px solid #61b0d6; margin-top:20px; padding:20px; }
.file-card{ background:#083544; border-left:14px solid #3699cc; margin:10px 0; padding:10px; }
.file-page{ background:#083544; border:3px solid #3699cc; padding:15px; margin:15px 0; }
</style>
</head>
<body>
<div class="site-wrapper">
  <div class="main-header">ФАЙЛЫ ОТ ФЕЙКОВОГО КОМПОТА</div>
  <div id="app"></div>
</div>

<script>
let role = localStorage.getItem("role");
let nick = localStorage.getItem("nick");

function saveAll(){ 
  localStorage.setItem("role", role);
  localStorage.setItem("nick", nick);
}

function render(){
  const app = document.getElementById("app");
  const modParam = new URLSearchParams(window.location.search).get("mod");

  if(modParam){
    fetch("http://localhost:3000/api/mods")
      .then(r=>r.json())
      .then(files=>{
        const f = files.find(x=>x.title===decodeURIComponent(modParam));
        if(!f){ app.innerHTML="<div>МОД НЕ НАЙДЕН</div>"; return; }
        let html = `<div class="file-page">
          <h2>${f.title}</h2>
          <a href="${f.url}" download><button>СКАЧАТЬ</button></a>
          <br><br>
          <a class="button-link" href="${window.location.pathname}">← НАЗАД</a>
        </div>`;
        app.innerHTML = html;
      });
    return;
  }

  if(!role){ showLogin(); return; }

  let html = `<button onclick="logout()">ВЫЙТИ</button>`;

  if(role==="admin"){
    html += `
      <div>
        <input type="file" id="file">
        <button onclick="upload()">ЗАГРУЗИТЬ</button>
      </div>`;
  }

  fetch("http://localhost:3000/api/mods")
    .then(r=>r.json())
    .then(files=>{
      html += `<div class="files-panel">`;
      files.forEach(f=>{
        html += `<div class="file-card">${f.title}<br>
                 <a class="button-link" href="?mod=${encodeURIComponent(f.title)}">ОТКРЫТЬ</a></div>`;
      });
      html += `</div>`;
      app.innerHTML = html;
    });
}

function showLogin(){
  document.getElementById("app").innerHTML = `
    <div>
      <input id="nickInput" placeholder="Ник">
      <button onclick="login()">ВОЙТИ</button>
    </div>`;
}

function login(){
  const n = document.getElementById("nickInput").value.trim();
  if(!n) return;
  if(n==="rtQu27"){
    const pass = prompt("Пароль:");
    role = (pass==="13")?"admin":"user";
  } else role="user";
  nick=n;
  saveAll();
  render();
}

function logout(){ role=null; nick=null; saveAll(); render(); }

function upload(){
  const input = document.getElementById("file");
  const f = input.files[0];
  if(!f) return;
  const form = new FormData();
  form.append("mod", f);
  fetch("http://localhost:3000/api/upload",{method:"POST",body:form})
    .then(r=>r.json())
    .then(r=>{ alert(r.message); render(); });
}

render();
</script>
</body>
</html>
