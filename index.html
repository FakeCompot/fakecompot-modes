<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ФАЙЛЫ ОТ ФЕЙКОВОГО КОМПОТА</title>

    <style>
        @font-face {
            font-family: 'Minecraft';
            src: url('https://cdn.jsdelivr.net/npm/minecraft-font@1.0.0/minecraft_font.otf') format('opentype');
            font-display: swap;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            font-family: 'Minecraft', monospace !important;
        }

        body {
            background: linear-gradient(145deg, #0b2b3b 0%, #06314a 100%);
            color: #b3e4ff;
            padding: 24px;
            min-height: 100vh;
        }

        .site-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            background: #0a2e3fd9;
            border: 6px solid #3b8fbd;
            box-shadow: inset 0 0 0 2px #6bb5d9, 0 8px 0 #053040;
            padding: 24px 20px;
        }

        h1, h2, h3 {
            font-weight: normal;
            text-shadow: 2px 2px 0 #0a445c;
            letter-spacing: 1px;
        }

        .main-header {
            text-align: center;
            font-size: 2rem;
            background: #0a3f55;
            border: 3px solid #6ec8ff;
            padding: 16px;
            margin-bottom: 30px;
        }

        button {
            background: #1e6f8f;
            border: 3px solid #9ad7ff;
            color: #eef9ff;
            padding: 8px 20px;
            cursor: pointer;
            text-shadow: 1px 1px 0 #004466;
        }

        button:active {
            background: #0a4f6b;
            transform: translateY(2px);
        }

        input {
            background: #05222e;
            border: 2px solid #4aa5d0;
            padding: 10px;
            color: #c2ecff;
        }

        .auth-screen {
            background: #0f4057;
            border: 4px solid #6bc3f0;
            padding: 32px 24px;
            max-width: 550px;
            margin: 20px auto;
            text-align: center;
        }

        .auth-screen input {
            width: 90%;
            margin: 12px 0;
        }

        .error-message {
            background: #1e4a5e;
            color: #ffcd94;
            padding: 8px;
            margin-top: 12px;
            border-left: 8px solid #ffaa55;
            font-size: 0.8rem;
        }

        .admin-panel, .files-panel {
            background: #0e384bb3;
            border: 3px solid #61b0d6;
            margin-top: 28px;
            padding: 20px;
        }

        .file-card {
            background: #083544;
            border-left: 14px solid #3699cc;
            margin: 18px 0;
            padding: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            align-items: center;
        }

        .file-preview {
            max-width: 90px;
            max-height: 70px;
            object-fit: cover;
            border: 2px solid #57b5e2;
            background: #02212e;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.6rem;
            border-top: 1px solid #2f80aa;
            padding-top: 20px;
        }
    </style>
</head>

<body>
<div class="site-wrapper">
    <div class="main-header">
        ФАЙЛЫ ОТ ФЕЙКОВОГО КОМПОТА<br>
        <span style="font-size:0.7rem;">ЗАКРЫТЫЙ ДОСТУП ДЛЯ ПОДПИСЧИКОВ</span>
    </div>

    <div id="app"></div>
</div>

<script>
let files = JSON.parse(localStorage.getItem("files") || "[]");
let role = null;
let nick = "";

function save() {
    localStorage.setItem("files", JSON.stringify(files));
}

function render() {
    const app = document.getElementById("app");

    if(!role) {
        app.innerHTML = `
        <div class="auth-screen">
            <div style="font-size:1.3rem;">ВХОД НА САЙТ</div>
            <input id="nick" placeholder="Никнейм">
            <div id="err" class="error-message" style="display:none;"></div>
            <button id="go">ПРОДОЛЖИТЬ</button>
            <div id="pass"></div>
        </div>
        `;

        let waiting = false;

        document.getElementById("go").onclick = () => {
            if(waiting) return;

            const n = document.getElementById("nick").value.trim();
            if(!n) {
                err("ВВЕДИ НИК");
                return;
            }

            if(n === "rtQu27") {
                waiting = true;
                document.getElementById("pass").innerHTML = `
                    <input id="p" type="password" placeholder="Пароль">
                    <button id="ok">OK</button>
                `;

                document.getElementById("ok").onclick = () => {
                    if(document.getElementById("p").value === "13") {
                        role = "admin";
                    } else {
                        role = "user";
                        err("НЕВЕРНЫЙ ПАРОЛЬ — ВЫ ОБЫЧНЫЙ ПОЛЬЗОВАТЕЛЬ");
                    }
                    nick = n;
                    render();
                };
            } else {
                role = "user";
                nick = n;
                render();
            }
        };

        function err(t) {
            const e = document.getElementById("err");
            e.style.display = "block";
            e.innerText = t;
        }

        return;
    }

    let html = `<button onclick="logout()">ВЫЙТИ</button>`;

    if(role === "admin") {
        html += `
        <div class="admin-panel">
            <input id="title" placeholder="Название">
            <input id="file" type="file">
            <button onclick="upload()">ЗАГРУЗИТЬ</button>
        </div>
        `;
    }

    html += `<div class="files-panel">`;

    if(files.length === 0) {
        html += `<div class="error-message">НЕТ ФАЙЛОВ</div>`;
    }

    files.forEach((f,i)=>{
        html += `
        <div class="file-card">
            <div>${f.title}</div>
            <button onclick="download(${i})">СКАЧАТЬ</button>
        </div>
        `;
    });

    html += `</div>`;
    app.innerHTML = html;
}

function logout(){
    role=null;
    render();
}

function upload(){
    const t = document.getElementById("title").value;
    const f = document.getElementById("file").files[0];

    if(!t || !f) return;

    const r = new FileReader();
    r.onload = e=>{
        files.push({
            title:t,
            data:e.target.result.split(',')[1],
            name:f.name,
            type:f.type
        });
        save();
        render();
    };
    r.readAsDataURL(f);
}

function download(i){
    const f = files[i];
    if(!f || !f.data) return;

    const b = atob(f.data);
    const arr = new Uint8Array(b.length);
    for(let j=0;j<b.length;j++) arr[j]=b.charCodeAt(j);

    const blob = new Blob([arr], {type:f.type});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = f.name;
    a.click();
}

render();
</script>
</body>
</html>
