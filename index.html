<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ФАЙЛЫ ОТ ФЕЙКОВОГО КОМПОТА</title>
<style>
@font-face {
    font-family: 'Minecraft';
    src: url('https://cdn.jsdelivr.net/npm/minecraft-font@1.0.0/minecraft_font.otf') format('opentype');
    font-display: swap;
}
* { box-sizing: border-box; margin:0; padding:0; font-family:'Minecraft', monospace!important; }
body { background: linear-gradient(145deg, #0b2b3b 0%, #06314a 100%); color:#b3e4ff; padding:24px; min-height:100vh; }
.site-wrapper { max-width:1300px; margin:0 auto; background:#0a2e3fd9; border:6px solid #3b8fbd; box-shadow: inset 0 0 0 2px #6bb5d9,0 8px 0 #053040; padding:24px 20px; }
.main-header { text-align:center; font-size:2rem; background:#0a3f55; border:3px solid #6ec8ff; padding:16px; margin-bottom:30px; }

button {
    background: #1e6f8f;
    border: 3px solid #9ad7ff;
    color: #eef9ff;
    padding: 8px 20px;
    cursor: pointer;
    text-shadow: 1px 1px 0 #004466;
    margin: 5px 0;
}
button:active { background: #0a4f6b; transform: translateY(2px); }

input, textarea {
    background: #05222e;
    border: 2px solid #4aa5d0;
    padding: 10px;
    color: #c2ecff;
    width: 90%;
    margin: 12px 0;
}

.auth-screen { background: #0f4057; border: 4px solid #6bc3f0; padding: 32px 24px; max-width: 550px; margin: 20px auto; text-align: center; }
.error-message { background: #1e4a5e; color: #ffcd94; padding: 8px; margin-top: 12px; border-left: 8px solid #ffaa55; font-size: 0.8rem; }
.admin-panel, .files-panel, .file-page, .comments-panel { background:#0e384bb3; border:3px solid #61b0d6; margin-top:28px; padding:20px; }
.file-card, .comment-card { background:#083544; border-left:14px solid #3699cc; margin:18px 0; padding:14px; display:flex; flex-direction:column; }
a.button-link { text-decoration:none; color:#eef9ff; background:#1e6f8f; border:3px solid #9ad7ff; padding:8px 20px; text-align:center; display:inline-block; text-shadow:1px 1px 0 #004466; }
a.button-link:hover { background:#0a4f6b; }
.reply-button { background:#1e3f5f; margin-top:5px; font-size:0.8rem; }
.reply-button:hover { background:#0a2b40; }
.reply-card { background:#0a3f55; border-left:10px solid #2288cc; margin:8px 0 8px 20px; padding:10px; }
</style>
</head>
<body>
<div class="site-wrapper">
    <div class="main-header">
        ФАЙЛЫ ОТ ФЕЙКОВОГО КОМПОТА<br>
        <span style="font-size:0.7rem;">ЗАКРЫТЫЙ ДОСТУП ДЛЯ ПОДПИСЧИКОВ</span>
    </div>
    <div id="app"></div>
</div>

<script>
// --- ДАННЫЕ ---
let files = JSON.parse(localStorage.getItem("files") || "[]");
let comments = JSON.parse(localStorage.getItem("comments") || "[]");
let role = null;
let nick = "";

// --- СОХРАНЕНИЕ ---
function saveFiles() { localStorage.setItem("files", JSON.stringify(files)); }
function saveComments() { localStorage.setItem("comments", JSON.stringify(comments)); }
function getParam(name) { const params = new URLSearchParams(window.location.search); return params.get(name); }

// --- РЕНДЕР ---
function render() {
    const app = document.getElementById("app");
    const modParam = getParam("mod");

    // --- Страница мода по ссылке ---
    if(modParam) {
        const f = files.find(x => x.title === decodeURIComponent(modParam));
        if(!f){ app.innerHTML="<div class='files-panel'>МОД НЕ НАЙДЕН</div>"; return; }

        let modHtml = `
        <div class="file-page">
            <h2>${f.title}</h2>
            <button onclick="downloadFile('${f.name}')">СКАЧАТЬ</button>
            <a class="button-link" href="${window.location.pathname}">← НАЗАД</a>
        </div>`;

        // --- Комментарии ---
        modHtml += `<div class="comments-panel"><h3>Комментарии</h3>`;
        const modComments = comments.filter(c => c.mod === f.title);
        if(modComments.length === 0) modHtml += "<div>НЕТ КОММЕНТАРИЕВ</div>";

        modComments.forEach(c => {
            modHtml += `<div class="comment-card">
                <strong>${c.nick}</strong>: ${c.text}
                <button class="reply-button" onclick="showReplyForm('${c.id}')">Ответить</button>
                <div id="replies-${c.id}"></div>
            </div>`;
            const replies = c.replies || [];
            replies.forEach(r => {
                modHtml += `<div class="reply-card"><strong>${r.nick}</strong>: ${r.text}</div>`;
            });
        });

        // --- Форма добавления комментария ---
        if(role){
            modHtml += `
            <div style="margin-top:20px;">
                <textarea id="new-comment" placeholder="Написать комментарий"></textarea><br>
                <button onclick="addComment('${f.title}')">Отправить</button>
            </div>`;
        } else {
            modHtml += `<div>Чтобы оставить комментарий, нужно войти.</div>`;
        }

        modHtml += `</div>`;
        app.innerHTML = modHtml;
        return;
    }

    // --- Вход на сайт ---
    if(!role) {
        app.innerHTML = `
        <div class="auth-screen">
            <div style="font-size:1.3rem;">ВХОД НА САЙТ</div>
            <input id="nick" placeholder="Никнейм">
            <div id="err" class="error-message" style="display:none;"></div>
            <div id="pass"></div>
            <button id="go">ПРОДОЛЖИТЬ</button>
        </div>`;

        document.getElementById("go").onclick = () => {
            const n = document.getElementById("nick").value.trim();
            if(!n){ document.getElementById("err").style.display="block"; document.getElementById("err").innerText="ВВЕДИ НИК"; return; }

            if(n==="rtQu27"){
                document.getElementById("pass").innerHTML = `
                    <input id="p" type="password" placeholder="Пароль">
                    <button id="ok">OK</button>
                `;
                document.getElementById("ok").onclick = () => {
                    const pass = document.getElementById("p").value;
                    if(pass==="13"){ role="admin"; nick=n; render(); }
                    else { role="user"; nick=n; document.getElementById("err").style.display="block"; document.getElementById("err").innerText="НЕВЕРНЫЙ ПАРОЛЬ — ВЫ ОБЫЧНЫЙ ПОЛЬЗОВАТЕЛЬ"; render(); }
                };
            } else {
                role="user"; nick=n; render();
            }
        };
        return;
    }

    // --- Главная панель ---
    let html = `<button onclick="logout()">ВЫЙТИ</button>`;
    if(role==="admin"){
        html += `
        <div class="admin-panel">
            <input id="title" placeholder="Название мода">
            <input id="file" type="file">
            <button onclick="upload()">ЗАГРУЗИТЬ</button>
        </div>`;
    }

    html += `<div class="files-panel">`;
    if(files.length===0){ html += "<div>НЕТ ФАЙЛОВ</div>"; }
    files.forEach(f => {
        html += `
        <div class="file-card">
            <div>${f.title}</div>
            <a class="button-link" href="?mod=${encodeURIComponent(f.title)}">ПЕРЕЙТИ</a>
        </div>`;
    });
    html += `</div>`;
    app.innerHTML = html;
}

// --- ВЫХОД ---
function logout(){ role=null; render(); }

// --- ЗАГРУЗКА ФАЙЛОВ ---
function upload() {
    const t = document.getElementById("title").value;
    const f = document.getElementById("file").files[0];
    if(!t||!f) return;
    const r = new FileReader();
    r.onload = e => {
        files.push({ title:t, data:e.target.result.split(',')[1], name:f.name, type:f.type });
        saveFiles(); render();
    };
    r.readAsDataURL(f);
}

// --- СКАЧАТЬ ---
function downloadFile(name){
    const f = files.find(x=>x.name===name);
    if(!f||!f.data) return;
    const b = atob(f.data);
    const arr = new Uint8Array(b.length);
    for(let i=0;i<b.length;i++) arr[i]=b.charCodeAt(i);
    const blob = new Blob([arr], {type:f.type});
    const a=document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = f.name;
    a.click();
}

// --- КОММЕНТАРИИ ---
function addComment(modTitle){
    const text = document.getElementById("new-comment").value.trim();
    if(!text) return;
    const id = 'c'+Date.now();
    comments.push({ id, mod:modTitle, nick:nick, text, replies:[] });
    saveComments(); render();
}

// --- ОТВЕТЫ ---
function showReplyForm(commentId){
    const c = comments.find(c => c.id === commentId);
    if(!c) return;
    const div = document.getElementById('replies-'+commentId);
    if(div.innerHTML) return; 
    div.innerHTML = `
        <textarea id="reply-${commentId}" placeholder="Ответить"></textarea>
        <button onclick="addReply('${commentId}')">Отправить</button>
    `;
}

function addReply(commentId){
    const c = comments.find(c => c.id === commentId);
    if(!c) return;
    const text = document.getElementById(`reply-${commentId}`).value.trim();
    if(!text) return;
    c.replies.push({ nick:nick, text });
    saveComments(); render();
}

render();
</script>
</body>
    </html>
